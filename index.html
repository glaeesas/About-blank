<!DOCTYPE html>
<html>
<head>
<title>Launcher</title>

<style>
body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:120px;
}

h1{
    font-size:40px;
}

input{
    width:350px;
    padding:12px;
    font-size:16px;
    border-radius:6px;
    border:none;
}

button{
    padding:12px 20px;
    font-size:16px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Site Launcher</h1>

<input id="url" placeholder="Enter a URL">
<button onclick="launch()">Open</button>

<script>
function launch(){

let url = document.getElementById("url").value;

if(!url.startsWith("http")){
url = "https://" + url;
}

let tab = window.open("about:blank","_blank");

tab.document.write(`
<html>
<head>
<title>Loading...</title>
<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
}
iframe{
width:100%;
height:100%;
border:none;
}
</style>
</head>
<body>
<iframe src="${url}"></iframe>
</body>
</html>
`);

}
</script>

</body>
</html>
